# ============================================================
# pytest configuration for competitive-intelligence-crew
# ============================================================
[pytest]
# Test discovery
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output / verbosity
addopts =
    -v
    --tb=short
    --strict-markers
    --no-header
    --color=yes
    --cov=src
    --cov=crew
    --cov=evaluation
    --cov=backend
    --cov-report=term-missing:skip-covered
    --cov-report=html:htmlcov
    --cov-report=xml:coverage.xml
    --cov-fail-under=60
    --timeout=120

# Async mode (pytest-asyncio)
asyncio_mode = auto

# Custom markers
markers =
    unit: Pure unit tests with no I/O or LLM calls
    integration: Integration tests that may touch the filesystem
    api: FastAPI endpoint tests
    crew: Full crew / workflow tests (slow)
    evaluation: Evaluation pipeline tests
    governance: Governance and security tests
    slow: Tests that take > 10 seconds

# Log capturing
log_cli = true
log_cli_level = WARNING
log_format = %(asctime)s %(levelname)s %(name)s: %(message)s
log_date_format = %H:%M:%S

# Ignore paths
norecursedirs =
    .venv
    .git
    build
    dist
    __pycache__
    *.egg-info
    htmlcov
    outputs
    logs
    cache
    database
    knowledge_base
