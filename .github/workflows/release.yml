# ============================================================
# Competitive Intelligence Crew — Release Workflow
# ============================================================
# Triggered by pushing a semver tag: v1.2.3 or v1.2.3-rc.1
#
# Jobs:
#   validate    → confirm tag format & changelog entry
#   build       → build + push versioned Docker image
#   release     → create GitHub Release with artefacts
#   publish-docs → (optional) update docs site
# ============================================================

name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"          # v1.2.3
      - "v[0-9]+.[0-9]+.[0-9]+-rc.[0-9]+" # v1.2.3-rc.1

permissions:
  contents: write    # create releases
  packages: write    # push to GHCR
  id-token: write    # OIDC (future: PyPI trusted publishing)

env:
  PYTHON_VERSION: "3.12"
  IMAGE_NAME: competitive-intelligence-crew
  REGISTRY: ghcr.io

# =============================================================================
jobs:

  # ──────────────────────────────────────────────────────────────────────────
  # 1. Validate the tag and extract version metadata
  # ──────────────────────────────────────────────────────────────────────────
  validate:
    name: "Validate Release Tag"
    runs-on: ubuntu-latest

    outputs:
      version: ${{ steps.meta.outputs.version }}
      is_prerelease: ${{ steps.meta.outputs.is_prerelease }}
      changelog_entry: ${{ steps.changelog.outputs.entry }}

    steps:
      - name: Checkout (full history for changelog)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version metadata
        id: meta
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

          if [[ "$TAG" == *"-rc."* ]]; then
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
          fi

          echo "Tag:        $TAG"
          echo "Version:    $VERSION"

      - name: Validate semver format
        run: |
          VERSION="${{ steps.meta.outputs.version }}"
          if ! echo "$VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+(-rc\.[0-9]+)?$'; then
            echo "::error::Invalid version format: $VERSION"
            exit 1
          fi
          echo "Version format valid: $VERSION"

      - name: Extract changelog entry
        id: changelog
        run: |
          TAG="${GITHUB_REF_NAME}"
          # Try to extract the section for this tag from CHANGELOG.md
          if [ -f CHANGELOG.md ]; then
            ENTRY=$(awk "/^## \[?${TAG}\]?/,/^## \[?v[0-9]/" CHANGELOG.md \
                    | head -n -1 | tail -n +2)
            if [ -z "$ENTRY" ]; then
              ENTRY="See commit history for changes in this release."
            fi
          else
            ENTRY="See commit history for changes in this release."
          fi
          # Write multi-line output safely
          EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          echo "entry<<${EOF}" >> "$GITHUB_OUTPUT"
          echo "${ENTRY}" >> "$GITHUB_OUTPUT"
          echo "${EOF}" >> "$GITHUB_OUTPUT"

  # ──────────────────────────────────────────────────────────────────────────
  # 2. Run the test suite to gate the release
  # ──────────────────────────────────────────────────────────────────────────
  test:
    name: "Release Test Gate"
    runs-on: ubuntu-latest
    needs: [validate]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt pytest-timeout==2.3.1

      - name: Create required directories
        run: |
          mkdir -p logs/test cache/test outputs database knowledge_base/vectorstore

      - name: Run unit & governance tests
        run: |
          pytest tests/ \
            -m "unit or governance" \
            -v --tb=short --timeout=60
        env:
          OPENROUTER_API_KEY: test-key-not-real
          DATABASE_URL: sqlite:///./database/test_intelligence.db
          CACHE_DIR: ./cache/test
          LOG_DIR: ./logs/test
          EVALUATION_ENABLED: "false"

  # ──────────────────────────────────────────────────────────────────────────
  # 3. Build and push versioned Docker image
  # ──────────────────────────────────────────────────────────────────────────
  build:
    name: "Build & Push Docker Image"
    runs-on: ubuntu-latest
    needs: [validate, test]

    outputs:
      image_digest: ${{ steps.push.outputs.digest }}
      image_url: ${{ steps.push.outputs.metadata }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute Docker metadata
        id: docker-meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner | lower }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable=${{ needs.validate.outputs.is_prerelease == 'false' }}
          labels: |
            org.opencontainers.image.title=Competitive Intelligence Crew
            org.opencontainers.image.description=Multi-agent AI competitive intelligence system
            org.opencontainers.image.version=${{ needs.validate.outputs.version }}

      - name: Build and push
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.docker-meta.outputs.tags }}
          labels: ${{ steps.docker-meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true     # SLSA provenance attestation
          sbom: true           # Software Bill of Materials

  # ──────────────────────────────────────────────────────────────────────────
  # 4. Package release artefacts (source dist, example config)
  # ──────────────────────────────────────────────────────────────────────────
  package:
    name: "Package Release Artefacts"
    runs-on: ubuntu-latest
    needs: [validate, test]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install packaging tools
        run: pip install build==1.2.2.post1

      - name: Create source distribution
        run: |
          VERSION="${{ needs.validate.outputs.version }}"
          # Build a plain tar.gz of the project (no PyPI wheel needed)
          tar -czf "competitive-intelligence-crew-${VERSION}.tar.gz" \
            --exclude='.git' \
            --exclude='.venv' \
            --exclude='__pycache__' \
            --exclude='*.pyc' \
            --exclude='htmlcov' \
            --exclude='coverage.xml' \
            --exclude='*.egg-info' \
            --exclude='outputs/*' \
            --exclude='logs/*' \
            --exclude='cache/*' \
            --exclude='database/*.db' \
            --exclude='knowledge_base/vectorstore/*' \
            .

      - name: Collect config example
        run: cp .env.example .env.example.release

      - name: Upload artefacts
        uses: actions/upload-artifact@v4
        with:
          name: release-artefacts-${{ needs.validate.outputs.version }}
          path: |
            competitive-intelligence-crew-${{ needs.validate.outputs.version }}.tar.gz
            .env.example.release
          retention-days: 90

  # ──────────────────────────────────────────────────────────────────────────
  # 5. Create the GitHub Release
  # ──────────────────────────────────────────────────────────────────────────
  release:
    name: "Create GitHub Release"
    runs-on: ubuntu-latest
    needs: [validate, build, package]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download release artefacts
        uses: actions/download-artifact@v4
        with:
          name: release-artefacts-${{ needs.validate.outputs.version }}
          path: ./artefacts

      - name: Generate release notes
        id: notes
        run: |
          VERSION="${{ needs.validate.outputs.version }}"
          IS_PRE="${{ needs.validate.outputs.is_prerelease }}"
          DIGEST="${{ needs.build.outputs.image_digest }}"
          REGISTRY_URL="${{ env.REGISTRY }}/${{ github.repository_owner | lower }}/${{ env.IMAGE_NAME }}"

          cat > release_notes.md << NOTES
          ## Competitive Intelligence Crew v${VERSION}

          ${{ needs.validate.outputs.changelog_entry }}

          ---

          ### Docker Image

          \`\`\`bash
          # Pull by version tag
          docker pull ${REGISTRY_URL}:${VERSION}

          # Pull by digest (pinned)
          docker pull ${REGISTRY_URL}@${DIGEST}
          \`\`\`

          ### Quick Start

          \`\`\`bash
          # 1. Clone this release
          tar -xzf competitive-intelligence-crew-${VERSION}.tar.gz
          cd competitive-intelligence-crew-${VERSION}

          # 2. Configure environment
          cp .env.example .env
          # Edit .env and set OPENROUTER_API_KEY

          # 3. Run with Docker Compose
          docker-compose up
          # Streamlit UI: http://localhost:8501
          # FastAPI docs: http://localhost:8000/docs
          \`\`\`

          ### What's Included
          - Multi-agent competitive intelligence pipeline (Research → Analysis → Writing)
          - FastAPI REST backend
          - Streamlit dashboard
          - Governance guard (prompt injection, run limits, citation enforcement)
          - Evaluation suite (RAGAS, DeepEval, Promptfoo)
          - Full audit trail & observability

          ---
          **Image digest:** \`${DIGEST}\`
          **Python:** 3.12 | **CrewAI:** 0.80.0 | **FastAPI:** 0.115.6
          NOTES

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "v${{ needs.validate.outputs.version }}"
          body_path: release_notes.md
          prerelease: ${{ needs.validate.outputs.is_prerelease == 'true' }}
          generate_release_notes: false
          files: |
            artefacts/competitive-intelligence-crew-${{ needs.validate.outputs.version }}.tar.gz
            artefacts/.env.example.release
          token: ${{ secrets.GITHUB_TOKEN }}

  # ──────────────────────────────────────────────────────────────────────────
  # 6. Post-release notification
  # ──────────────────────────────────────────────────────────────────────────
  notify:
    name: "Post-release Notification"
    runs-on: ubuntu-latest
    needs: [release]
    if: always()

    steps:
      - name: Report release status
        run: |
          if [ "${{ needs.release.result }}" = "success" ]; then
            echo "::notice title=Release Published::v${{ needs.validate.outputs.version }} released successfully"
          else
            echo "::error title=Release Failed::v${{ needs.validate.outputs.version }} release failed"
          fi

      - name: Notify via webhook (optional)
        if: ${{ secrets.RELEASE_WEBHOOK_URL != '' }}
        run: |
          curl -s -X POST "${{ secrets.RELEASE_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d '{
              "version": "${{ needs.validate.outputs.version }}",
              "status":  "${{ needs.release.result }}",
              "repo":    "${{ github.repository }}",
              "tag":     "${{ github.ref_name }}"
            }' || true
