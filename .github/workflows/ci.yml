# ============================================================
# Competitive Intelligence Crew — CI/CD Pipeline
# ============================================================
# Jobs:
#   lint        → code-style & type checks
#   security    → dependency audit & SAST
#   test        → unit + integration tests with coverage
#   quality     → coverage gate
#   docker      → build & smoke-test the Docker image
#   deploy-dev  → deploy to dev environment (develop branch)
#   deploy-prod → deploy to production (main branch, after manual approval)
# ============================================================

name: CI Pipeline

on:
  push:
    branches: [main, develop]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - ".gitignore"
  pull_request:
    branches: [main, develop]
    types: [opened, synchronize, reopened]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"
  IMAGE_NAME: competitive-intelligence-crew
  REGISTRY: ghcr.io
  # Safe test-only keys — real keys must be in GitHub Secrets
  OPENROUTER_API_KEY: test-key-not-real
  DATABASE_URL: sqlite:///./database/test_intelligence.db
  CACHE_DIR: ./cache/test
  LOG_DIR: ./logs/test
  EVALUATION_ENABLED: "false"
  LLM_CACHE_ENABLED: "true"

# ── Required permissions ──────────────────────────────────────────────────────
permissions:
  contents: read
  packages: write        # push to GHCR
  security-events: write # upload SARIF

# =============================================================================
jobs:

  # ──────────────────────────────────────────────────────────────────────────
  # 1. Lint — style, formatting, imports, and type checking
  # ──────────────────────────────────────────────────────────────────────────
  lint:
    name: "Lint & Format"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install lint tools
        run: |
          pip install --upgrade pip
          pip install black==24.10.0 isort==5.13.2 flake8==7.1.1 \
                      flake8-bugbear==24.10.31 flake8-docstrings==1.7.0 \
                      mypy==1.13.0 types-pyyaml types-requests types-python-dateutil

      - name: Check formatting (black)
        run: black --check --diff --line-length=100 src/ backend/ crew/ config/ evaluation/ frontend/ tests/ app.py

      - name: Check import order (isort)
        run: isort --check-only --diff --profile=black --line-length=100 src/ backend/ crew/ config/ evaluation/ frontend/ tests/ app.py

      - name: Lint (flake8)
        run: |
          flake8 src/ backend/ crew/ config/ evaluation/ \
            --max-line-length=100 \
            --extend-ignore=D100,D101,D102,D103,D104,D105,D106,D107,D200,D205,D400,D401,E501,E203,B008 \
            --exclude=.venv,venv312,build,dist,__pycache__,*.egg-info

      - name: Type check (mypy) — non-blocking
        run: |
          mypy src/ crew/ config/ \
            --ignore-missing-imports \
            --no-error-summary \
            --follow-imports=silent || true

  # ──────────────────────────────────────────────────────────────────────────
  # 2. Security — dependency CVE audit + SAST (no app install needed)
  # ──────────────────────────────────────────────────────────────────────────
  security:
    name: "Security Scan"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install security tools only
        run: |
          pip install --upgrade pip
          pip install pip-audit==2.9.0 bandit==1.9.4

      - name: Dependency vulnerability audit (pip-audit)
        # Audit requirements.txt directly — no need to install all deps
        run: |
          pip-audit --requirement requirements.txt \
            --skip-editable \
            --ignore-vuln GHSA-r9dh-gcmq-qwpq \
            || true

      - name: SAST scan (bandit)
        run: |
          bandit -r src/ backend/ crew/ config/ \
            -ll \
            --exclude ./tests,./evaluation \
            -f sarif \
            -o bandit-results.sarif || true

      - name: Upload SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: bandit-results.sarif
        continue-on-error: true

      - name: Check for secrets in code (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

  # ──────────────────────────────────────────────────────────────────────────
  # 3. Test — unit + integration, with coverage
  # ──────────────────────────────────────────────────────────────────────────
  test:
    name: "Tests (Python ${{ matrix.python-version }})"
    runs-on: ubuntu-latest
    needs: [lint]

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        # requirements.txt already includes pytest-timeout==2.3.1 — no separate install needed
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create required directories
        run: |
          mkdir -p logs/test cache/test outputs database \
                   knowledge_base/vectorstore knowledge_base/reports

      - name: Run unit tests (fast, no I/O)
        run: |
          pytest tests/ \
            -m "unit or governance" \
            -v \
            --tb=short \
            --timeout=60 \
            --no-header \
            --no-cov
        env:
          OPENROUTER_API_KEY: test-key-not-real
          DATABASE_URL: sqlite:///./database/test_intelligence.db

      - name: Run integration tests with coverage
        run: |
          pytest tests/ \
            -m "not slow and not crew" \
            -v \
            --tb=short \
            --timeout=120 \
            --cov=src \
            --cov=crew \
            --cov=evaluation \
            --cov=backend \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing:skip-covered \
            --no-header
        env:
          OPENROUTER_API_KEY: test-key-not-real
          DATABASE_URL: sqlite:///./database/test_intelligence.db

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: matrix.python-version == env.PYTHON_VERSION
        with:
          name: coverage-report
          path: |
            coverage.xml
            htmlcov/
          retention-days: 14

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: matrix.python-version == env.PYTHON_VERSION
        with:
          file: ./coverage.xml
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  # ──────────────────────────────────────────────────────────────────────────
  # 4. Coverage quality gate
  # ──────────────────────────────────────────────────────────────────────────
  quality:
    name: "Coverage Gate"
    runs-on: ubuntu-latest
    needs: [test]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download coverage report
        uses: actions/download-artifact@v4
        with:
          name: coverage-report

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install coverage
        run: pip install coverage==7.6.9

      - name: Enforce coverage threshold (60%)
        run: |
          python -c "
          import xml.etree.ElementTree as ET
          tree = ET.parse('coverage.xml')
          root = tree.getroot()
          pct = float(root.attrib.get('line-rate', 0)) * 100
          print(f'Coverage: {pct:.1f}%')
          assert pct >= 60, f'Coverage {pct:.1f}% is below 60% threshold'
          print('Coverage gate PASSED')
          "

  # ──────────────────────────────────────────────────────────────────────────
  # 5. Docker — build & smoke-test
  # ──────────────────────────────────────────────────────────────────────────
  docker:
    name: "Docker Build & Smoke Test"
    runs-on: ubuntu-latest
    needs: [test]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: buildx-${{ github.sha }}
          restore-keys: buildx-

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: ${{ env.IMAGE_NAME }}:ci-${{ github.sha }}
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max
          load: true

      - name: Move cache (avoid ever-growing cache)
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache

      - name: Smoke test — Python imports
        run: |
          docker run --rm \
            -e OPENROUTER_API_KEY=test-key \
            -e DATABASE_URL=sqlite:///./test.db \
            ${{ env.IMAGE_NAME }}:ci-${{ github.sha }} \
            python -c "
          import sys; print('Python', sys.version)
          import streamlit; print('streamlit', streamlit.__version__)
          import fastapi; print('fastapi', fastapi.__version__)
          import crewai; print('crewai', crewai.__version__)
          import pydantic; print('pydantic', pydantic.__version__)
          print('All imports OK')
          "

      - name: Smoke test — backend starts
        run: |
          docker run --rm -d \
            --name ci-backend-test \
            -p 8000:8000 \
            -e OPENROUTER_API_KEY=test-key \
            -e DATABASE_URL=sqlite:///./test.db \
            ${{ env.IMAGE_NAME }}:ci-${{ github.sha }} \
            uvicorn backend.main:app --host 0.0.0.0 --port 8000 &
          sleep 8
          curl --fail --retry 3 --retry-delay 2 http://localhost:8000/health \
            || (docker logs ci-backend-test && exit 1)
          docker stop ci-backend-test || true

      - name: Log in to GitHub Container Registry
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Tag and push image (main/develop only)
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=local,src=/tmp/.buildx-cache

  # ──────────────────────────────────────────────────────────────────────────
  # 6. Deploy to Development (develop branch only)
  # ──────────────────────────────────────────────────────────────────────────
  deploy-dev:
    name: "Deploy → Development"
    runs-on: ubuntu-latest
    needs: [quality, docker]
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
    environment:
      name: development
      url: ${{ vars.DEV_APP_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to dev server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEV_HOST }}
          username: ${{ secrets.DEV_USER }}
          key: ${{ secrets.DEV_SSH_KEY }}
          script: |
            cd /opt/competitive-intelligence-crew
            docker pull ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:develop
            docker-compose -f docker-compose.yml \
              -f docker-compose.dev.yml \
              up -d --remove-orphans
            docker image prune -f
            echo "Dev deploy complete: $(date)"
        continue-on-error: true

      - name: Notify dev deploy
        if: always()
        run: echo "::notice title=Dev Deploy::Image ${{ env.IMAGE_NAME }}:develop deployed"

  # ──────────────────────────────────────────────────────────────────────────
  # 7. Deploy to Production (main branch only, requires approval)
  # ──────────────────────────────────────────────────────────────────────────
  deploy-prod:
    name: "Deploy → Production"
    runs-on: ubuntu-latest
    needs: [quality, docker]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: production
      url: ${{ vars.PROD_APP_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to production server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            set -euo pipefail
            cd /opt/competitive-intelligence-crew
            docker pull ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:main
            docker-compose up -d --no-deps --scale app=2 app
            sleep 15
            docker-compose up -d --no-deps --scale app=1 app
            docker image prune -f
            echo "Prod deploy complete: $(date) — SHA ${{ github.sha }}"

      - name: Verify production health
        run: |
          sleep 10
          curl --fail --retry 5 --retry-delay 3 \
            "${{ vars.PROD_APP_URL }}/health" \
            || echo "::warning::Health check failed — investigate deployment"

      - name: Create GitHub deployment marker
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.sha,
              environment: 'production',
              description: 'Automated production deployment',
              auto_merge: false,
              required_contexts: [],
            });
