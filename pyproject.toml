[tool.black]
line-length = 100
target-version = ["py312"]
exclude = '''
/(
    venv312
  | \.venv
  | build
  | dist
  | __pycache__
  | \.git
)/
'''

[tool.isort]
profile = "black"
line_length = 100
skip_glob = ["venv312/*", ".venv/*"]

[tool.flake8]
max-line-length = 100
extend-ignore = ["D100","D101","D102","D103","D104","D105","D107","E501","E203"]
exclude = [".venv", "venv312", "build", "dist", "__pycache__", "*.egg-info"]
