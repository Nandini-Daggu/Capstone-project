# ============================================================
# Competitive Intelligence Briefing Crew - Docker Compose
# ============================================================

version: "3.9"

services:
  # ── FastAPI Backend ────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: ci-crew-api
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./logs:/app/logs
      - ./outputs:/app/outputs
      - ./database:/app/database
      - ./knowledge_base:/app/knowledge_base
      - ./cache:/app/cache
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  # ── Streamlit Frontend ─────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: ci-crew-frontend
    command: streamlit run app.py --server.port 8501 --server.address 0.0.0.0
    ports:
      - "8501:8501"
    env_file:
      - .env
    environment:
      - API_BASE_URL=http://api:8000
    volumes:
      - ./logs:/app/logs
      - ./outputs:/app/outputs
      - ./database:/app/database
      - ./knowledge_base:/app/knowledge_base
      - ./cache:/app/cache
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  logs:
  outputs:
  database:
  knowledge_base:
  cache:
